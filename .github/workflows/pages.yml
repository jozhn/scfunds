name: Build and deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      refresh_data:
        description: 'Run npm run update-data before building'
        required: true
        default: true
        type: boolean
      commit_data:
        description: 'Commit refreshed public/data/funds.json back to main'
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Refresh fund data
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.refresh_data }}
        run: npm run update-data

      - name: Commit refreshed fund data
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.refresh_data && inputs.commit_data }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/funds.json
          if git diff --cached --quiet; then
            echo "No fund data changes to commit."
          else
            git commit -m "Update fund data [skip ci]"
            git push
          fi

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          GITHUB_PAGES: 'true'

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
